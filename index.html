<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гонка — городской стиль</title>
  <style>
    :root{
      --bg1:#89b6e6;
      --bg2:#f0b3a5;
      --hud:#2e3542cc;
      --hudText:#f7fbff;
      --road1:#2e3137;
      --road2:#1f2227;
      --line:#ffd84a;
      --wall:#d8dbe1;
      --wallStripe:#d98b3a;
      --city1:#8a8697;
      --city2:#5c6070;
      --coin1:#ffd84a;
      --coin2:#f59e0b;
      --danger1:#ff7a59;
      --danger2:#b91c1c;
      --cyan:#7be7ff;
      --white:rgba(255,255,255,.95);
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --panel:#dfe4e8;
      --panel2:#d2d8dd;
      --text:#15253d;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#8dd4ef,#cde8f3);
      min-height:100vh;
    }

    .app{
      max-width:1480px;
      margin:0 auto;
      padding:18px;
      display:grid;
      grid-template-columns:360px 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border-radius:30px;
      padding:22px;
      box-shadow:0 14px 34px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.72);
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:22px;
    }

    h1,h2,h3,p{margin-top:0}
    h1{font-size:42px;margin-bottom:0}
    h3{font-size:22px;margin-bottom:14px}

    .badge{
      padding:12px 18px;
      border-radius:999px;
      background:linear-gradient(180deg,#dfe9f8,#c9d8ec);
      font-weight:700;
      font-size:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:18px;
    }

    .stat{
      border-radius:24px;
      padding:16px;
    }
    .stat.blue{background:linear-gradient(180deg,#bfd9ea,#aacbdf)}
    .stat.yellow{background:linear-gradient(180deg,#efdeac,#efcc6d)}

    .stat-label{
      font-size:16px;
      color:rgba(21,37,61,.65);
      margin-bottom:14px;
    }

    .stat-value{
      font-size:52px;
      font-weight:800;
      line-height:1;
    }

    .progress-wrap{margin-bottom:20px}
    .progress-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:17px;
      margin-bottom:10px;
      color:rgba(21,37,61,.72);
    }
    .progress{
      height:18px;
      border-radius:999px;
      background:#c4d0dc;
      overflow:hidden;
      box-shadow:inset 0 3px 6px rgba(0,0,0,.08);
    }
    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#14b5f7,#2b57f6);
      transition:width .15s linear;
    }

    .box{
      border-radius:26px;
      padding:18px;
      margin-bottom:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(0,0,0,.06);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
    }

    .controls,.actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .setting-item{margin-bottom:16px}
    .setting-item label{
      display:block;
      font-size:17px;
      margin-bottom:8px;
      color:rgba(21,37,61,.76);
    }
    input[type="range"]{width:100%}

    button{
      border:none;
      border-radius:18px;
      padding:16px 18px;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      transition:transform .08s ease, opacity .2s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }
    button:hover{opacity:.96}
    button:active{transform:scale(.98)}

    .btn-primary{
      color:white;
      background:linear-gradient(180deg,#36c8ff,#2959f5);
    }
    .btn-secondary{
      color:var(--text);
      background:linear-gradient(180deg,#eef1f4,#d8dfe6);
    }
    .btn-outline{
      color:var(--text);
      background:linear-gradient(180deg,#eeeeee,#dddddd);
    }

    .note{
      font-size:16px;
      line-height:1.45;
      color:rgba(21,37,61,.72);
      margin:0;
    }

    .game-wrap{
      position:relative;
      min-height:860px;
      border-radius:34px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:2px solid rgba(255,255,255,.45);
      background:linear-gradient(180deg,#739ad0 0%, #b8c9e7 48%, #dce7f1 100%);
    }

    .scene{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .sky{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,187,156,.45), transparent 22%),
        radial-gradient(circle at 62% 20%, rgba(255,213,186,.32), transparent 20%),
        radial-gradient(circle at 80% 16%, rgba(255,170,140,.25), transparent 18%),
        linear-gradient(180deg, #6998cf 0%, #88acdb 22%, #9fc0e7 42%, #bfd2e8 60%, #dbe5f0 100%);
      z-index:0;
    }

    .cloud{
      position:absolute;
      background:rgba(255,255,255,.2);
      filter:blur(6px);
      border-radius:999px;
      z-index:1;
    }

    .city{
      position:absolute;
      left:0;right:0;
      bottom:53%;
      height:20%;
      z-index:2;
      pointer-events:none;
    }

    .building{
      position:absolute;
      bottom:0;
      background:linear-gradient(180deg,var(--city1),var(--city2));
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.08);
    }

    .building .windows{
      position:absolute;
      inset:10px 8px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(234,239,255,.72) 0px,
          rgba(234,239,255,.72) 10px,
          transparent 10px,
          transparent 20px
        ),
        repeating-linear-gradient(
          180deg,
          rgba(234,239,255,.72) 0px,
          rgba(234,239,255,.72) 8px,
          transparent 8px,
          transparent 20px
        );
      opacity:.78;
    }

    .road-world{
      position:absolute;
      inset:0;
      z-index:3;
    }

    .road{
      position:absolute;
      left:50%;
      top:30%;
      width:84%;
      height:74%;
      transform:translateX(-50%);
      clip-path:polygon(38% 0%, 62% 0%, 100% 100%, 0% 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.08)),
        linear-gradient(180deg, var(--road1), var(--road2));
      box-shadow:0 -4px 18px rgba(255,255,255,.08), inset 0 0 50px rgba(0,0,0,.18);
    }

    .lane-center{
      position:absolute;
      left:50%;
      top:30%;
      width:8%;
      height:74%;
      transform:translateX(-50%);
      clip-path:polygon(38% 0%, 62% 0%, 100% 100%, 0% 100%);
      opacity:.95;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,216,74,.92) 0px,
          rgba(255,216,74,.92) 48px,
          rgba(255,216,74,0) 48px,
          rgba(255,216,74,0) 104px
        );
    }

    .lane-left, .lane-right{
      position:absolute;
      top:30%;
      height:74%;
      width:1.2%;
      background:linear-gradient(180deg,#f0d039,#c4990d);
      opacity:.9;
    }
    .lane-left{
      left:28%;
      transform:skewX(-16deg);
    }
    .lane-right{
      right:28%;
      transform:skewX(16deg);
    }

    .wall-left, .wall-right{
      position:absolute;
      top:25%;
      width:26%;
      height:68%;
      z-index:4;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,.22) 0px,
          rgba(255,255,255,.22) 2px,
          transparent 2px,
          transparent 22px
        ),
        linear-gradient(180deg, #edf1f5, #b7bec7);
      box-shadow:inset 0 0 0 2px rgba(0,0,0,.04);
    }
    .wall-left{
      left:-2%;
      clip-path:polygon(0 8%, 94% 0, 100% 100%, 0 100%);
    }
    .wall-right{
      right:-2%;
      clip-path:polygon(6% 0, 100% 8%, 100% 100%, 0 100%);
    }

    .wall-stripes-left, .wall-stripes-right{
      position:absolute;
      top:52%;
      width:100%;
      height:16%;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 22px,
          rgba(217,139,58,.95) 22px,
          rgba(217,139,58,.95) 54px
        );
      transform:skewY(-12deg);
      opacity:.8;
    }

    .tunnel{
      position:absolute;
      left:50%;
      top:30%;
      width:28%;
      height:16%;
      transform:translateX(-50%);
      z-index:5;
    }

    .tunnel-face{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#6d7079,#3a3d44);
      clip-path:polygon(8% 0, 92% 0, 100% 100%, 0 100%);
      box-shadow:0 12px 20px rgba(0,0,0,.2);
    }

    .tunnel-hole{
      position:absolute;
      left:10%;
      right:10%;
      top:18%;
      bottom:0;
      background:linear-gradient(180deg,#101316,#191d22);
      clip-path:polygon(8% 0, 92% 0, 100% 100%, 0 100%);
      overflow:hidden;
    }

    .tunnel-lights{
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(79,255,186,.9) 0px,
          rgba(79,255,186,.9) 10px,
          transparent 10px,
          transparent 48px
        );
      opacity:.55;
      transform:perspective(300px) rotateX(20deg);
    }

    .sign{
      position:absolute;
      top:-8%;
      width:22%;
      height:38%;
      background:linear-gradient(180deg,#2d7b32,#1f5d25);
      border:3px solid rgba(255,255,255,.7);
      color:white;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:6px;
      text-align:center;
      padding:6px;
      z-index:6;
    }
    .sign.left{left:24%}
    .sign.right{right:24%}

    .hud-top{
      position:absolute;
      left:0;right:0;top:0;
      z-index:12;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:18px 18px 0;
      pointer-events:none;
    }

    .hud-pause{
      width:58px;
      height:58px;
      border-radius:0 0 18px 0;
      background:var(--hud);
      color:var(--hudText);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      pointer-events:auto;
    }

    .hud-right{
      display:flex;
      gap:14px;
      align-items:flex-start;
      pointer-events:auto;
    }

    .hud-box{
      background:var(--hud);
      color:var(--hudText);
      border-radius:0 0 0 18px;
      padding:12px 18px;
      min-width:150px;
      text-align:right;
      font-weight:800;
      font-size:22px;
      letter-spacing:1px;
    }

    .hud-coins{
      margin-top:10px;
      background:linear-gradient(180deg,rgba(27,30,36,.76),rgba(17,20,25,.76));
      color:#ffca28;
      border-radius:16px;
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      justify-content:flex-end;
    }

    .coin-mini{
      width:28px;
      height:28px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%, #fff2a8, var(--coin1) 45%, var(--coin2) 100%);
      box-shadow:0 0 10px rgba(255,200,0,.45);
    }

    .object-layer{
      position:absolute;
      inset:0;
      z-index:9;
      pointer-events:none;
    }

    .game-object{
      position:absolute;
      transform:translate(-50%,-50%);
      pointer-events:none;
      filter:drop-shadow(0 12px 14px rgba(0,0,0,.3));
    }

    .coin{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%, #fff5ba, var(--coin1) 42%, var(--coin2) 100%);
      border:3px solid rgba(255,214,90,.9);
      box-shadow:0 0 18px rgba(255,196,0,.45);
      animation:coinSpin .9s infinite ease-in-out;
    }
    .coin::before{
      content:"★";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#d97706;
      font-size:55%;
      font-weight:900;
      text-shadow:0 1px 0 rgba(255,255,255,.7);
    }

    @keyframes coinSpin{
      0%{transform:scaleX(1)}
      50%{transform:scaleX(.7)}
      100%{transform:scaleX(1)}
    }

    .obstacle-cone,.obstacle-barrel,.obstacle-car{
      width:100%;
      height:100%;
      position:relative;
    }

    .obstacle-cone::before{
      content:"";
      position:absolute;
      left:50%;
      bottom:8%;
      transform:translateX(-50%);
      width:58%;
      height:74%;
      background:linear-gradient(180deg,#ffb354,#ff6a00);
      clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
      border-radius:10px;
    }
    .obstacle-cone::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:90%;
      height:18%;
      border-radius:999px;
      background:linear-gradient(180deg,#fff,#d7dbe1);
    }

    .obstacle-barrel::before{
      content:"";
      position:absolute;
      left:50%;
      top:5%;
      transform:translateX(-50%);
      width:68%;
      height:90%;
      border-radius:12px;
      background:
        repeating-linear-gradient(
          180deg,
          #ff9b39 0px,
          #ff9b39 12px,
          #d2460f 12px,
          #d2460f 22px
        );
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
    }

    .obstacle-car::before{
      content:"";
      position:absolute;
      inset:8%;
      border-radius:14px;
      clip-path:polygon(50% 0%,84% 18%,94% 48%,86% 84%,50% 100%,14% 84%,6% 48%,16% 18%);
      background:linear-gradient(180deg,#f94d60,#78171a);
    }
    .obstacle-car::after{
      content:"";
      position:absolute;
      left:30%;
      right:30%;
      top:22%;
      height:18%;
      border-radius:10px;
      background:linear-gradient(180deg,#0d1117,#293241);
    }

    .player-car{
      position:absolute;
      left:50%;
      bottom:52px;
      width:340px;
      height:270px;
      transform:translateX(-50%);
      z-index:10;
      transition:transform .14s ease;
      filter:drop-shadow(0 18px 24px rgba(0,0,0,.36));
      pointer-events:none;
    }

    .car-rear{
      position:absolute;
      inset:0;
      clip-path:polygon(50% 8%, 84% 22%, 94% 58%, 82% 88%, 50% 100%, 18% 88%, 6% 58%, 16% 22%);
      background:
        linear-gradient(180deg,#ff83ad 0%, #d83777 22%, #3c3872 52%, #10121a 100%);
      border:4px solid rgba(255,255,255,.16);
      box-shadow:inset 0 8px 12px rgba(255,255,255,.12), inset 0 -16px 24px rgba(0,0,0,.35);
      border-radius:24px;
    }

    .car-glass{
      position:absolute;
      left:28%;
      top:18%;
      width:44%;
      height:22%;
      background:linear-gradient(180deg,#26354b,#12171f);
      border-radius:10px 10px 18px 18px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.08);
    }

    .car-glass::before{
      content:"";
      position:absolute;
      left:46%;
      top:0;
      width:8%;
      height:100%;
      background:rgba(255,255,255,.12);
    }

    .car-wing{
      position:absolute;
      left:16%;
      right:16%;
      top:18%;
      height:12px;
      background:#15191f;
      border-radius:999px;
    }

    .car-wing::before,.car-wing::after{
      content:"";
      position:absolute;
      top:2px;
      width:16px;
      height:24px;
      background:#ea4a2b;
    }
    .car-wing::before{left:-6px;transform:skewY(20deg)}
    .car-wing::after{right:-6px;transform:skewY(-20deg)}

    .tail-left,.tail-right{
      position:absolute;
      bottom:28%;
      width:24%;
      height:10%;
      background:linear-gradient(180deg,#ff4738,#9c1712);
      border-radius:0 30px 18px 18px;
      box-shadow:0 0 16px rgba(255,50,30,.45);
    }
    .tail-left{left:8%}
    .tail-right{right:8%;transform:scaleX(-1)}

    .rear-panel{
      position:absolute;
      left:27%;
      right:27%;
      bottom:18%;
      height:18%;
      background:linear-gradient(180deg,#06080b,#11151b);
      border-radius:10px 10px 18px 18px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.04);
    }

    .diffuser{
      position:absolute;
      left:24%;
      right:24%;
      bottom:8%;
      height:10%;
      background:linear-gradient(180deg,#0d1014,#1b1f26);
      clip-path:polygon(0 0,100% 0,94% 100%,6% 100%);
    }

    .player-shadow{
      position:absolute;
      left:50%;
      bottom:34px;
      width:250px;
      height:42px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.45), rgba(0,0,0,0));
      z-index:9;
      pointer-events:none;
    }

    .side-control{
      position:absolute;
      top:50%;
      width:110px;
      height:110px;
      transform:translateY(-50%);
      z-index:14;
      pointer-events:auto;
      border:none;
      box-shadow:none;
      background:transparent;
    }

    .side-control.left{left:18px}
    .side-control.right{right:18px}

    .side-control .arrow{
      position:absolute;
      inset:0;
      background:rgba(123,231,255,.25);
      border:3px solid rgba(123,231,255,.55);
      box-shadow:0 0 18px rgba(123,231,255,.2);
      backdrop-filter:blur(2px);
    }
    .side-control.left .arrow{
      clip-path:polygon(76% 10%, 18% 50%, 76% 90%, 58% 56%, 92% 56%, 92% 44%, 58% 44%);
    }
    .side-control.right .arrow{
      clip-path:polygon(24% 10%, 82% 50%, 24% 90%, 42% 56%, 8% 56%, 8% 44%, 42% 44%);
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(9,19,34,.34);
      padding:20px;
    }

    .modal{
      width:100%;
      max-width:560px;
      background:rgba(255,255,255,.97);
      border-radius:28px;
      box-shadow:0 24px 50px rgba(0,0,0,.26);
      padding:28px;
      text-align:center;
    }

    .modal h2{
      margin:0 0 10px;
      font-size:32px;
    }

    .modal-icon{
      font-size:62px;
      margin-bottom:8px;
    }

    .question-box{
      background:linear-gradient(180deg,#f8fcff,#edf6fb);
      border-radius:20px;
      padding:18px;
      font-size:30px;
      font-weight:900;
      margin:18px 0;
    }

    .answers.choice{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .answer-input-row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .answer-input-row input{
      flex:1;
      padding:14px 16px;
      font-size:18px;
      border-radius:16px;
      border:2px solid #cbd5e1;
      outline:none;
    }

    .feedback{
      margin-top:16px;
      border-radius:16px;
      padding:12px 14px;
      font-weight:800;
    }

    .feedback.success{
      background:#d1fae5;
      color:#065f46;
    }

    .feedback.warning{
      background:#fef3c7;
      color:#92400e;
    }

    .finish-box{
      margin:18px auto 0;
      max-width:340px;
      background:linear-gradient(180deg,#dff4ff,#b7e7ff);
      border-radius:20px;
      padding:18px;
      font-size:24px;
      font-weight:900;
    }

    .finish-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .tiny{
      font-size:14px;
      color:rgba(16,35,58,.72);
    }

    @media (max-width:1200px){
      .app{grid-template-columns:1fr}
      .game-wrap{min-height:780px}
    }

    @media (max-width:900px){
      .player-car{width:260px;height:210px}
      .side-control{width:86px;height:86px}
      .hud-box{font-size:18px}
    }

    @media (max-width:760px){
      .stats,.controls,.actions,.answers.choice{grid-template-columns:1fr}
      .answer-input-row{flex-direction:column}
      .player-car{width:220px;height:180px}
      .side-control{width:72px;height:72px}
      .hud-pause{width:48px;height:48px;font-size:22px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="title-row">
        <h1 id="gameTitle">Гонка</h1>
        <div class="badge" id="levelBadge">Уровень 1</div>
      </div>

      <div class="stats">
        <div class="stat blue">
          <div class="stat-label">💎 Алмазы</div>
          <div class="stat-value" id="diamondsValue">0</div>
        </div>
        <div class="stat yellow">
          <div class="stat-label">⏱ Время</div>
          <div class="stat-value" id="timeValue">45</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span>Прогресс трассы</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="box">
        <h3>Управление</h3>
        <div class="controls">
          <button class="btn-secondary" id="btnLeft">⬅ Влево</button>
          <button class="btn-secondary" id="btnRight">➡ Вправо</button>
        </div>
        <p class="note">Стрелки есть и на самой трассе — как в референсе.</p>
      </div>

      <div class="box">
        <h3>Параметры прототипа</h3>

        <div class="setting-item">
          <label for="speedRange">Скорость: <span id="speedLabel">6</span></label>
          <input type="range" id="speedRange" min="4" max="12" step="1" value="6" />
        </div>

        <div class="setting-item">
          <label for="timeRange">Время: <span id="timeLabel">45</span> сек</label>
          <input type="range" id="timeRange" min="20" max="90" step="5" value="45" />
        </div>

        <div class="actions">
          <button class="btn-primary" id="btnStart">▶ Старт</button>
          <button class="btn-outline" id="btnReset">↻ Сброс</button>
        </div>
      </div>

      <div class="box">
        <p class="note">
          Визуал сделан по мотивам твоей картинки: городской хайвей, тоннель, большая машина сзади, верхний HUD и боковые стрелки.
        </p>
      </div>
    </aside>

    <main class="game-wrap">
      <div class="scene">
        <div class="sky"></div>
        <div class="cloud" style="left:4%;top:8%;width:220px;height:54px;"></div>
        <div class="cloud" style="right:10%;top:11%;width:260px;height:60px;"></div>

        <div class="city">
          <div class="building" style="left:11%;width:8%;height:44%;"><div class="windows"></div></div>
          <div class="building" style="left:22%;width:4%;height:56%;"><div class="windows"></div></div>
          <div class="building" style="left:28%;width:5%;height:34%;"><div class="windows"></div></div>
          <div class="building" style="left:61%;width:6%;height:40%;"><div class="windows"></div></div>
          <div class="building" style="left:70%;width:18%;height:72%;"><div class="windows"></div></div>
        </div>

        <div class="road-world">
          <div class="road"></div>
          <div class="lane-center" id="laneCenter"></div>
          <div class="lane-left"></div>
          <div class="lane-right"></div>

          <div class="wall-left">
            <div class="wall-stripes-left"></div>
          </div>
          <div class="wall-right">
            <div class="wall-stripes-right"></div>
          </div>

          <div class="tunnel">
            <div class="tunnel-face"></div>
            <div class="tunnel-hole">
              <div class="tunnel-lights"></div>
            </div>
            <div class="sign left">Route A</div>
            <div class="sign right">Tunnel</div>
          </div>
        </div>

        <div class="hud-top">
          <div class="hud-pause">❚❚</div>
          <div class="hud-right">
            <div>
              <div class="hud-box">x1&nbsp;&nbsp;&nbsp;0000754</div>
              <div class="hud-coins">
                <span id="diamondsMini">0</span>
                <div class="coin-mini"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="object-layer" id="objectsLayer"></div>

        <div class="player-shadow"></div>
        <div class="player-car" id="playerCar">
          <div class="car-rear"></div>
          <div class="car-glass"></div>
          <div class="car-wing"></div>
          <div class="tail-left"></div>
          <div class="tail-right"></div>
          <div class="rear-panel"></div>
          <div class="diffuser"></div>
        </div>

        <button class="side-control left" id="sideLeft" aria-label="Влево">
          <div class="arrow"></div>
        </button>

        <button class="side-control right" id="sideRight" aria-label="Вправо">
          <div class="arrow"></div>
        </button>

        <div id="overlayLayer"></div>
      </div>
    </main>
  </div>

  <script>
    const GAME_CONFIG = {
      meta: {
        title: "Гонка",
        finishMessage: "Поздравляем! Ты финишировал!",
        startButtonText: "Старт",
        restartButtonText: "Играть снова"
      },
      teacherSettings: {
        speed: 6,
        totalTimeSec: 45,
        attemptsPerQuestion: 1,
        loseDiamondsOnCrash: 1,
        gainDiamondsOnCorrect: 1,
        useKeyboard: true,
        objectCount: 18,
        diamondRatio: 0.55
      },
      levels: [
        {
          id: 1,
          name: "Уровень 1",
          distance: 100,
          laneCount: 3,
          questions: [
            { id: "l1q1", prompt: "3 + 2 = ?", answerType: "choice", correctAnswer: "5", options: ["4", "5", "6"] },
            { id: "l1q2", prompt: "8 - 3 = ?", answerType: "choice", correctAnswer: "5", options: ["5", "4", "6"] },
            { id: "l1q3", prompt: "6 + 1 = ?", answerType: "input", correctAnswer: "7" },
            { id: "l1q4", prompt: "4 + 4 = ?", answerType: "choice", correctAnswer: "8", options: ["7", "8", "9"] },
            { id: "l1q5", prompt: "10 - 6 = ?", answerType: "input", correctAnswer: "4" }
          ]
        },
        {
          id: 2,
          name: "Уровень 2",
          distance: 120,
          laneCount: 3,
          questions: [
            { id: "l2q1", prompt: "12 - 5 = ?", answerType: "choice", correctAnswer: "7", options: ["6", "7", "8"] },
            { id: "l2q2", prompt: "9 + 6 = ?", answerType: "input", correctAnswer: "15" },
            { id: "l2q3", prompt: "14 - 4 = ?", answerType: "choice", correctAnswer: "10", options: ["9", "10", "11"] },
            { id: "l2q4", prompt: "5 × 2 = ?", answerType: "choice", correctAnswer: "10", options: ["8", "10", "12"] },
            { id: "l2q5", prompt: "18 - 9 = ?", answerType: "input", correctAnswer: "9" }
          ]
        }
      ]
    };

    const GAME = {
      tickMs: 40,
      lanePositions: [0.38, 0.5, 0.62],
      startY: 24,
      endY: 76,
      dashOffset: 0
    };

    const state = {
      settings: JSON.parse(JSON.stringify(GAME_CONFIG.teacherSettings)),
      currentLevelIndex: 0,
      gameStatus: "ready",
      playerLane: 1,
      diamonds: 0,
      timeLeft: GAME_CONFIG.teacherSettings.totalTimeSec,
      distancePassed: 0,
      runtimeObjects: [],
      quizState: null,
      finishStats: null,
      nextQuestionIndex: 0,
      timerAcc: 0,
      gameLoop: null
    };

    const ui = {
      gameTitle: document.getElementById("gameTitle"),
      levelBadge: document.getElementById("levelBadge"),
      diamondsValue: document.getElementById("diamondsValue"),
      diamondsMini: document.getElementById("diamondsMini"),
      timeValue: document.getElementById("timeValue"),
      progressText: document.getElementById("progressText"),
      progressBar: document.getElementById("progressBar"),
      objectsLayer: document.getElementById("objectsLayer"),
      overlayLayer: document.getElementById("overlayLayer"),
      btnLeft: document.getElementById("btnLeft"),
      btnRight: document.getElementById("btnRight"),
      sideLeft: document.getElementById("sideLeft"),
      sideRight: document.getElementById("sideRight"),
      btnStart: document.getElementById("btnStart"),
      btnReset: document.getElementById("btnReset"),
      speedRange: document.getElementById("speedRange"),
      timeRange: document.getElementById("timeRange"),
      speedLabel: document.getElementById("speedLabel"),
      timeLabel: document.getElementById("timeLabel"),
      playerCar: document.getElementById("playerCar"),
      laneCenter: document.getElementById("laneCenter")
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function currentLevel() {
      return GAME_CONFIG.levels[state.currentLevelIndex];
    }

    function normalizeAnswer(value) {
      return String(value ?? "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function laneX(lane) {
      return GAME.lanePositions[lane] ?? GAME.lanePositions[1];
    }

    function progressToScreen(progress) {
      const y = GAME.startY + (GAME.endY - GAME.startY) * progress;
      const scale = 0.26 + progress * 1.38;
      return { y, scale };
    }

    function createRandomObject(i, level) {
      const isDiamond = Math.random() < state.settings.diamondRatio;
      const variants = ["cone", "barrel", "car"];
      return {
        id: uid() + "_" + i,
        type: isDiamond ? "diamond" : "obstacle",
        variant: isDiamond ? null : variants[Math.floor(Math.random() * variants.length)],
        lane: Math.floor(Math.random() * level.laneCount),
        progress: -(i * 0.24 + Math.random() * 0.28 + 0.42),
        active: true
      };
    }

    function buildRandomRuntime(level) {
      const arr = [];
      for (let i = 0; i < state.settings.objectCount; i++) {
        arr.push(createRandomObject(i, level));
      }
      return arr;
    }

    function respawnObject(obj, level) {
      const isDiamond = Math.random() < state.settings.diamondRatio;
      const variants = ["cone", "barrel", "car"];
      obj.type = isDiamond ? "diamond" : "obstacle";
      obj.variant = isDiamond ? null : variants[Math.floor(Math.random() * variants.length)];
      obj.lane = Math.floor(Math.random() * level.laneCount);
      obj.progress = -(0.6 + Math.random() * 1.6);
      obj.active = true;
    }

    function renderHUD() {
      const level = currentLevel();
      const progress = clamp((state.distancePassed / level.distance) * 100, 0, 100);

      ui.gameTitle.textContent = GAME_CONFIG.meta.title;
      ui.levelBadge.textContent = level.name;
      ui.diamondsValue.textContent = state.diamonds;
      ui.diamondsMini.textContent = state.diamonds;
      ui.timeValue.textContent = state.timeLeft;
      ui.progressText.textContent = Math.round(progress) + "%";
      ui.progressBar.style.width = progress + "%";
    }

    function updatePlayerVisual() {
      const xShift = [-160, 0, 160][state.playerLane] || 0;
      const tilt = [-8, 0, 8][state.playerLane] || 0;
      ui.playerCar.style.transform = "translateX(calc(-50% + " + xShift + "px)) rotate(" + tilt + "deg)";
    }

    function createObjectElement(obj) {
      const pos = progressToScreen(obj.progress);
      if (pos.y < 12 || pos.y > 84) return null;

      const el = document.createElement("div");
      el.className = "game-object";
      el.style.left = (laneX(obj.lane) * 100) + "%";
      el.style.top = pos.y + "%";
      el.style.width = (52 * pos.scale) + "px";
      el.style.height = (52 * pos.scale) + "px";

      const inner = document.createElement("div");
      if (obj.type === "diamond") {
        inner.className = "coin";
      } else if (obj.variant === "cone") {
        inner.className = "obstacle-cone";
      } else if (obj.variant === "car") {
        inner.className = "obstacle-car";
      } else {
        inner.className = "obstacle-barrel";
      }

      el.appendChild(inner);
      return el;
    }

    function renderObjects() {
      ui.objectsLayer.innerHTML = "";
      for (const obj of state.runtimeObjects) {
        if (!obj.active) continue;
        const el = createObjectElement(obj);
        if (el) ui.objectsLayer.appendChild(el);
      }
    }

    function renderOverlay() {
      ui.overlayLayer.innerHTML = "";

      if (state.gameStatus === "ready") {
        ui.overlayLayer.innerHTML = `
          <div class="overlay">
            <div class="modal">
              <div class="modal-icon">🏁</div>
              <h2>Готов к старту?</h2>
              <p>Собирай монеты-алмазы, отвечай на вопросы и избегай препятствий.</p>
              <button class="btn-primary" id="overlayStartBtn" style="width:100%;margin-top:12px;">
                ▶ ${GAME_CONFIG.meta.startButtonText}
              </button>
            </div>
          </div>
        `;
        document.getElementById("overlayStartBtn").addEventListener("click", startGame);
      }

      if (state.gameStatus === "pausedForQuiz" && state.quizState) {
        const q = state.quizState.question;
        let content = `
          <div class="overlay">
            <div class="modal">
              <h2>Задание за алмаз</h2>
              <div class="question-box">${q.prompt}</div>
        `;

        if (q.answerType === "choice") {
          content += `<div class="answers choice">`;
          q.options.forEach(option => {
            content += `<button class="btn-secondary quiz-choice" data-answer="${option}">${option}</button>`;
          });
          content += `</div>`;
        } else {
          content += `
            <div class="answer-input-row">
              <input id="quizInput" type="text" placeholder="Введи ответ" />
              <button class="btn-primary" id="quizSubmitBtn">Ответить</button>
            </div>
          `;
        }

        if (state.quizState.feedback) {
          content += `
            <div class="feedback ${state.quizState.feedback.type}">
              ${state.quizState.feedback.message}
            </div>
          `;
        }

        content += `
              <p class="tiny" style="margin-top:12px;">
                Попытка: ${state.quizState.attemptsUsed + 1}
                ${state.quizState.maxAttempts > 0 ? " / " + state.quizState.maxAttempts : ""}
              </p>
            </div>
          </div>
        `;

        ui.overlayLayer.innerHTML = content;

        if (q.answerType === "choice") {
          document.querySelectorAll(".quiz-choice").forEach(btn => {
            btn.addEventListener("click", () => submitAnswer(btn.dataset.answer));
          });
        } else {
          const input = document.getElementById("quizInput");
          const submitBtn = document.getElementById("quizSubmitBtn");
          input.focus();
          submitBtn.addEventListener("click", () => submitAnswer(input.value));
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submitAnswer(input.value);
          });
        }
      }

      if (state.gameStatus === "finished" && state.finishStats) {
        const stats = state.finishStats;
        ui.overlayLayer.innerHTML = `
          <div class="overlay">
            <div class="modal">
              <div class="modal-icon">🏎️</div>
              <h2>${stats.success ? GAME_CONFIG.meta.finishMessage : "Время вышло!"}</h2>
              <p>Уровень: ${stats.levelName}</p>
              <div class="finish-box">💎 Собрано алмазов: ${stats.diamonds}</div>
              <div class="finish-actions">
                <button class="btn-outline" id="restartBtn">${GAME_CONFIG.meta.restartButtonText}</button>
                ${stats.nextLevelAvailable ? `<button class="btn-primary" id="nextLevelBtn">Следующий уровень</button>` : ""}
              </div>
            </div>
          </div>
        `;

        document.getElementById("restartBtn").addEventListener("click", () => resetGame(state.currentLevelIndex));
        const nextLevelBtn = document.getElementById("nextLevelBtn");
        if (nextLevelBtn) {
          nextLevelBtn.addEventListener("click", () => resetGame(state.currentLevelIndex + 1));
        }
      }
    }

    function render() {
      renderHUD();
      renderObjects();
      renderOverlay();
      updatePlayerVisual();
    }

    function clearLoop() {
      if (state.gameLoop) {
        clearInterval(state.gameLoop);
        state.gameLoop = null;
      }
    }

    function setupLevel(index) {
      state.currentLevelIndex = index;
      state.playerLane = 1;
      state.runtimeObjects = buildRandomRuntime(currentLevel());
    }

    function resetGame(index = state.currentLevelIndex) {
      clearLoop();
      setupLevel(index);
      state.gameStatus = "ready";
      state.diamonds = 0;
      state.timeLeft = state.settings.totalTimeSec;
      state.distancePassed = 0;
      state.quizState = null;
      state.finishStats = null;
      state.nextQuestionIndex = 0;
      state.timerAcc = 0;
      GAME.dashOffset = 0;
      render();
    }

    function startGame() {
      clearLoop();
      setupLevel(state.currentLevelIndex);
      state.gameStatus = "running";
      state.diamonds = 0;
      state.timeLeft = state.settings.totalTimeSec;
      state.distancePassed = 0;
      state.quizState = null;
      state.finishStats = null;
      state.nextQuestionIndex = 0;
      state.timerAcc = 0;
      GAME.dashOffset = 0;
      render();
      state.gameLoop = setInterval(gameTick, GAME.tickMs);
    }

    function gameTick() {
      if (state.gameStatus !== "running") return;

      const level = currentLevel();

      state.distancePassed += state.settings.speed * 0.18;
      if (state.distancePassed > level.distance) state.distancePassed = level.distance;

      state.timerAcc += GAME.tickMs;
      if (state.timerAcc >= 1000) {
        state.timerAcc = 0;
        state.timeLeft = Math.max(0, state.timeLeft - 1);
      }

      GAME.dashOffset += state.settings.speed * 5;
      const offset = GAME.dashOffset % 104;
      ui.laneCenter.style.background = `
        repeating-linear-gradient(
          180deg,
          rgba(255,216,74,.92) ${offset}px,
          rgba(255,216,74,.92) ${offset + 48}px,
          rgba(255,216,74,0) ${offset + 48}px,
          rgba(255,216,74,0) ${offset + 104}px
        )
      `;

      for (const obj of state.runtimeObjects) {
        if (!obj.active) continue;
        obj.progress += 0.008 + state.settings.speed * 0.00195;
        if (obj.progress > 1.15) {
          respawnObject(obj, level);
        }
      }

      checkCollisions();
      checkFinish();
      render();
    }

    function moveLeft() {
      state.playerLane = clamp(state.playerLane - 1, 0, currentLevel().laneCount - 1);
      updatePlayerVisual();
    }

    function moveRight() {
      state.playerLane = clamp(state.playerLane + 1, 0, currentLevel().laneCount - 1);
      updatePlayerVisual();
    }

    function checkCollisions() {
      if (state.gameStatus !== "running") return;

      const collided = state.runtimeObjects.find(obj =>
        obj.active &&
        obj.lane === state.playerLane &&
        obj.progress > 0.88 &&
        obj.progress < 1.02
      );

      if (!collided) return;

      collided.active = false;

      if (collided.type === "obstacle") {
        state.diamonds = Math.max(0, state.diamonds - state.settings.loseDiamondsOnCrash);
        setTimeout(() => {
          respawnObject(collided, currentLevel());
        }, 300);
        return;
      }

      const level = currentLevel();
      const question = level.questions[state.nextQuestionIndex % level.questions.length];
      state.nextQuestionIndex += 1;
      state.gameStatus = "pausedForQuiz";
      state.quizState = {
        question,
        attemptsUsed: 0,
        maxAttempts: state.settings.attemptsPerQuestion,
        feedback: null
      };
    }

    function continueAfterQuiz(feedback) {
      state.quizState.feedback = feedback;
      renderOverlay();

      setTimeout(() => {
        state.quizState = null;
        state.gameStatus = "running";
        render();
      }, 800);
    }

    function submitAnswer(value) {
      if (!state.quizState || !state.quizState.question) return;

      const isCorrect = normalizeAnswer(value) === normalizeAnswer(state.quizState.question.correctAnswer);

      if (isCorrect) {
        state.diamonds += state.settings.gainDiamondsOnCorrect;
        continueAfterQuiz({ type: "success", message: "+1 алмаз! Верно." });
        return;
      }

      const nextAttempts = state.quizState.attemptsUsed + 1;
      const maxAttempts = state.quizState.maxAttempts;
      const canRetry = maxAttempts === 0 || nextAttempts < maxAttempts;

      if (canRetry) {
        state.quizState.attemptsUsed = nextAttempts;
        state.quizState.feedback = {
          type: "warning",
          message: "Пока неверно. Попробуй ещё раз."
        };
        renderOverlay();
        return;
      }

      continueAfterQuiz({ type: "warning", message: "Неверно. Едем дальше." });
    }

    function checkFinish() {
      if (state.gameStatus !== "running") return;

      const level = currentLevel();
      const noTime = state.timeLeft <= 0;
      const finishedDistance = state.distancePassed >= level.distance;

      if (!noTime && !finishedDistance) return;

      clearLoop();

      const isLastLevel = state.currentLevelIndex >= GAME_CONFIG.levels.length - 1;
      state.gameStatus = "finished";
      state.finishStats = {
        diamonds: state.diamonds,
        levelName: level.name,
        success: finishedDistance,
        nextLevelAvailable: finishedDistance && !isLastLevel
      };
      render();
    }

    ui.btnLeft.addEventListener("click", moveLeft);
    ui.btnRight.addEventListener("click", moveRight);
    ui.sideLeft.addEventListener("click", moveLeft);
    ui.sideRight.addEventListener("click", moveRight);
    ui.btnStart.addEventListener("click", startGame);
    ui.btnReset.addEventListener("click", () => resetGame(state.currentLevelIndex));

    ui.speedRange.addEventListener("input", (e) => {
      state.settings.speed = Number(e.target.value);
      ui.speedLabel.textContent = state.settings.speed;
    });

    ui.timeRange.addEventListener("input", (e) => {
      state.settings.totalTimeSec = Number(e.target.value);
      ui.timeLabel.textContent = state.settings.totalTimeSec;
      if (state.gameStatus === "ready") state.timeLeft = state.settings.totalTimeSec;
      renderHUD();
    });

    document.addEventListener("keydown", (e) => {
      if (!state.settings.useKeyboard) return;
      if (["ArrowLeft", "a", "A", "ф", "Ф"].includes(e.key)) moveLeft();
      if (["ArrowRight", "d", "D", "в", "В"].includes(e.key)) moveRight();
    });

    function init() {
      setupLevel(0);
      resetGame(0);
      updatePlayerVisual();
    }

    init();
  </script>
</body>
</html>
