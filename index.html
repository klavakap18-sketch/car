<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гонка — образовательная игра</title>
  <style>
    :root{
      --sky1:#72d8f5;
      --sky2:#b7eef9;
      --panel:#dfe4e8;
      --panel2:#d5dbe0;
      --text:#162a45;
      --blue:#25a7ff;
      --blue2:#245dff;
      --gold:#efc56b;
      --gold2:#cb9336;
      --roadLine:#ffe7a0;
      --grass:#72d325;
      --grass2:#58bc1a;
      --danger:#ef4444;
      --shadow:0 16px 34px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--sky1),var(--sky2));
      min-height:100vh;
    }

    .app{
      max-width:1460px;
      margin:0 auto;
      padding:18px;
      display:grid;
      grid-template-columns:390px 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border-radius:32px;
      padding:22px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.6);
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
    }

    h1,h2,h3,p{margin-top:0}
    h1{font-size:44px;margin-bottom:0}
    h3{font-size:24px;margin-bottom:16px}

    .badge{
      padding:14px 22px;
      border-radius:999px;
      font-size:18px;
      font-weight:700;
      background:linear-gradient(180deg,#dfe9f8,#c7d7ec);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
      white-space:nowrap;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:18px;
    }

    .stat{
      border-radius:24px;
      padding:18px 18px 20px;
    }
    .stat.blue{background:linear-gradient(180deg,#bfd9ea,#aecde1)}
    .stat.yellow{background:linear-gradient(180deg,#eddca8,#f0cf73)}
    .stat-label{
      font-size:18px;
      color:rgba(22,42,69,.65);
      margin-bottom:18px;
    }
    .stat-value{
      font-size:58px;
      font-weight:800;
      line-height:1;
    }

    .progress-wrap{margin-bottom:22px}
    .progress-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:18px;
      margin-bottom:10px;
      color:rgba(22,42,69,.72);
    }
    .progress{
      height:20px;
      background:#c8d2dd;
      border-radius:999px;
      overflow:hidden;
      box-shadow:inset 0 3px 6px rgba(0,0,0,.08);
    }
    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#1aaae8,#2b57f6);
      transition:width .15s linear;
    }

    .box{
      background:rgba(255,255,255,.08);
      border-radius:28px;
      padding:20px;
      margin-bottom:18px;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    button{
      border:none;
      border-radius:20px;
      padding:18px 20px;
      font-size:22px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
      transition:transform .08s ease, opacity .2s ease;
    }
    button:hover{opacity:.96}
    button:active{transform:scale(.98)}

    .btn-primary{
      color:#fff;
      background:linear-gradient(180deg,#39c7ff,#2b57f6);
    }
    .btn-secondary{
      color:var(--text);
      background:linear-gradient(180deg,#e9edf0,#d7dde4);
    }
    .btn-outline{
      color:var(--text);
      background:linear-gradient(180deg,#ededed,#dbdbdb);
    }

    .setting-item{margin-bottom:18px}
    .setting-item label{
      display:block;
      font-size:18px;
      margin-bottom:10px;
      color:rgba(22,42,69,.75);
    }
    input[type="range"]{width:100%}

    .note{
      font-size:17px;
      line-height:1.45;
      color:rgba(22,42,69,.7);
      margin:0;
    }

    .game-wrap{
      position:relative;
      min-height:820px;
      border-radius:34px;
      overflow:hidden;
      box-shadow:0 20px 42px rgba(0,0,0,.22);
      border:2px solid rgba(255,255,255,.45);
      background:linear-gradient(180deg,#68c8e5 0%, #90dced 60%, #aadae6 100%);
    }

    .sky{
      position:absolute;
      inset:0;
      z-index:0;
      background:linear-gradient(180deg,#69c6e7 0%, #8fdbec 65%, #9ddfe8 100%);
    }

    .cloud{
      position:absolute;
      background:#ececec;
      border-radius:999px;
      z-index:1;
      opacity:.95;
    }
    .cloud:before,.cloud:after{
      content:"";
      position:absolute;
      background:inherit;
      border-radius:inherit;
    }
    .cloud:before{width:55%;height:100%;left:10%;top:-38%}
    .cloud:after{width:40%;height:85%;right:10%;top:-20%}

    .horizon{
      position:absolute;
      left:0; right:0;
      top:49%;
      height:3px;
      background:rgba(255,255,255,.18);
      z-index:2;
    }

    .hill{
      position:absolute;
      bottom:46%;
      background:linear-gradient(180deg,var(--grass),var(--grass2));
      border-radius:50% 50% 0 0;
      z-index:2;
    }

    .ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:46%;
      background:#abd4e0;
      z-index:2;
    }

    .tree{
      position:absolute;
      bottom:33%;
      width:44px;
      height:100px;
      z-index:3;
    }
    .tree .crown{
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      width:70px;
      height:56px;
      background:linear-gradient(180deg,#6bcc20,#54b518);
      border-radius:50%;
      box-shadow:inset 0 -6px 0 rgba(0,0,0,.08);
    }
    .tree .trunk{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:12px;
      height:42px;
      background:#8b5a1f;
      border-radius:8px;
    }

    .road-area{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
    }

    .road-perspective{
      position:absolute;
      left:50%;
      top:13%;
      width:55%;
      height:76%;
      transform:translateX(-50%);
      clip-path:polygon(46.5% 0%, 53.5% 0%, 94% 100%, 6% 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.08)),
        linear-gradient(180deg, var(--gold), var(--gold2));
      box-shadow:0 0 40px rgba(219,159,58,.18);
    }

    .center-line{
      position:absolute;
      left:50%;
      top:13%;
      width:7%;
      height:76%;
      transform:translateX(-50%);
      clip-path:polygon(46.5% 0%, 53.5% 0%, 94% 100%, 6% 100%);
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,232,166,.95) 0px,
          rgba(255,232,166,.95) 44px,
          rgba(255,232,166,0) 44px,
          rgba(255,232,166,0) 98px
        );
      opacity:.95;
    }

    .guard{
      position:absolute;
      top:21%;
      width:13%;
      height:79%;
      z-index:5;
      background:
        repeating-linear-gradient(
          90deg,
          #ededed 0px,#ededed 30px,
          #e12222 30px,#e12222 60px
        );
    }
    .guard.left{
      left:12.8%;
      clip-path:polygon(38% 0, 62% 0, 100% 100%, 0 100%);
    }
    .guard.right{
      right:12.8%;
      clip-path:polygon(38% 0, 62% 0, 100% 100%, 0 100%);
    }

    .glow-pad{
      position:absolute;
      border-radius:10px;
      border:4px solid rgba(84,199,255,.9);
      background:rgba(144,212,235,.15);
      box-shadow:0 0 14px rgba(84,199,255,.45), inset 0 0 10px rgba(255,255,255,.2);
      z-index:5;
    }

    .top-left-preview{
      position:absolute;
      left:22px;
      top:22px;
      width:130px;
      height:130px;
      border-radius:24px;
      padding:10px;
      background:rgba(245,245,245,.92);
      z-index:12;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }
    .preview-scene{
      position:relative;
      width:100%;
      height:100%;
      border-radius:18px;
      overflow:hidden;
      background:linear-gradient(180deg,#8bdcf0 0%, #d4f0f2 40%, #8bdf68 100%);
    }
    .preview-road{
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:52%;
      height:100%;
      clip-path:polygon(35% 0, 65% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg,#efb54f,#c98f2f);
    }
    .preview-car{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:34px;
      height:48px;
      border-radius:14px;
      background:linear-gradient(180deg,#17a4ff,#2850ff);
      box-shadow:0 0 10px rgba(38,88,255,.45);
    }

    .level-pill{
      position:absolute;
      right:20px;
      top:22px;
      z-index:12;
      padding:16px 22px;
      border-radius:999px;
      background:rgba(245,245,245,.92);
      font-size:18px;
      font-weight:800;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }

    .object-layer{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
    }

    .game-object{
      position:absolute;
      transform:translate(-50%,-50%);
      pointer-events:none;
      filter:drop-shadow(0 12px 12px rgba(0,0,0,.22));
    }

    .diamond{
      position:relative;
      width:100%;
      height:100%;
      clip-path:polygon(50% 0%, 88% 26%, 72% 100%, 28% 100%, 12% 26%);
      background:linear-gradient(180deg,#dffcff,#7ce0ff 50%, #1aa5ff 100%);
      border:3px solid rgba(255,255,255,.85);
      box-shadow:0 0 18px rgba(84,220,255,.7);
      animation:diamondPulse .8s infinite ease-in-out;
    }
    .diamond:before{
      content:"";
      position:absolute;
      inset:12% 20% 40% 20%;
      background:rgba(255,255,255,.35);
      clip-path:polygon(50% 0%, 100% 40%, 50% 100%, 0% 40%);
    }

    @keyframes diamondPulse{
      0%{transform:scale(1)}
      50%{transform:scale(1.08)}
      100%{transform:scale(1)}
    }

    .obstacle-rock,.obstacle-cone,.obstacle-car{
      width:100%;
      height:100%;
      position:relative;
    }
    .obstacle-rock:before{
      content:"";
      position:absolute;
      inset:10%;
      background:linear-gradient(180deg,#9ca3af,#4b5563);
      clip-path:polygon(24% 20%, 55% 6%, 84% 20%, 94% 54%, 74% 90%, 31% 95%, 10% 62%);
      border-radius:14px;
    }
    .obstacle-cone:before{
      content:"";
      position:absolute;
      left:50%;
      bottom:12%;
      transform:translateX(-50%);
      width:56%;
      height:70%;
      background:linear-gradient(180deg,#ffb54a,#ff6a00);
      clip-path:polygon(50% 0%,100% 100%,0% 100%);
      border-radius:10px;
    }
    .obstacle-cone:after{
      content:"";
      position:absolute;
      left:50%;
      bottom:4%;
      transform:translateX(-50%);
      width:84%;
      height:16%;
      background:linear-gradient(180deg,#fff,#e5e7eb);
      border-radius:999px;
    }
    .obstacle-car:before{
      content:"";
      position:absolute;
      inset:10%;
      background:linear-gradient(180deg,#ff4f4f,#9f1717);
      clip-path:polygon(50% 0%,84% 18%,94% 48%,86% 84%,50% 100%,14% 84%,6% 48%,16% 18%);
      border-radius:12px;
    }
    .obstacle-car:after{
      content:"";
      position:absolute;
      left:28%;
      right:28%;
      top:22%;
      height:18%;
      border-radius:10px;
      background:linear-gradient(180deg,rgba(0,0,0,.95),rgba(40,40,70,.75));
    }

    .player-car{
      position:absolute;
      left:50%;
      bottom:112px;
      width:250px;
      height:220px;
      transform:translateX(-50%);
      z-index:10;
      transition:transform .16s ease;
      filter:drop-shadow(0 18px 20px rgba(0,0,0,.28));
      pointer-events:none;
    }
    .car-body{
      position:absolute;
      inset:0;
      clip-path:polygon(50% 4%,74% 18%,84% 39%,88% 66%,77% 86%,50% 98%,23% 86%,12% 66%,16% 39%,26% 18%);
      background:linear-gradient(180deg,#2fb7ff 0%, #2f5fff 50%, #25008f 100%);
      box-shadow:inset 0 8px 14px rgba(255,255,255,.2), inset 0 -12px 20px rgba(0,0,0,.25);
      border:4px solid rgba(255,255,255,.22);
      border-radius:24px;
    }
    .car-window{
      position:absolute;
      left:29%;
      top:18%;
      width:42%;
      height:30%;
      border-radius:18px 18px 10px 10px;
      background:linear-gradient(180deg,rgba(0,0,0,.96),rgba(18,45,90,.8));
      border:3px solid rgba(255,255,255,.12);
      box-shadow:inset 0 2px 6px rgba(255,255,255,.12);
    }
    .car-window:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,transparent 45%, rgba(255,255,255,.16) 45%, rgba(255,255,255,.16) 55%, transparent 55%);
    }
    .car-tail{
      position:absolute;
      left:50%;
      bottom:16%;
      transform:translateX(-50%);
      width:56%;
      height:18%;
      border-radius:16px;
      background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.66));
    }
    .neon-left,.neon-right{
      position:absolute;
      bottom:8%;
      width:22px;
      height:80px;
      border-radius:14px;
      background:linear-gradient(180deg,rgba(243,53,255,.95),rgba(122,0,255,.46));
      box-shadow:0 0 16px rgba(227,58,255,.85);
    }
    .neon-left{left:16%}
    .neon-right{right:16%}
    .thruster-left,.thruster-right{
      position:absolute;
      bottom:3%;
      width:12px;
      height:52px;
      border-radius:999px;
      background:linear-gradient(180deg,#8b00ff,rgba(0,255,255,.2));
      box-shadow:0 0 14px rgba(0,224,255,.7);
    }
    .thruster-left{left:33%}
    .thruster-right{right:33%}

    .bottom-controls{
      position:absolute;
      left:24px;
      right:24px;
      bottom:18px;
      z-index:15;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      pointer-events:none;
    }

    .wheel-box,.map-box,.drive-controls{
      pointer-events:auto;
    }

    .wheel-box{
      width:150px;
      height:150px;
      border-radius:50%;
      background:rgba(245,245,245,.92);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }

    .steering{
      position:relative;
      width:100px;
      height:100px;
      border:9px solid #9b7645;
      border-radius:50%;
      background:radial-gradient(circle,#d1d6dc 0%,#b9c2cc 40%,transparent 42%);
      transition:transform .12s ease;
    }
    .steering:before,.steering:after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:#9b7645;
      border-radius:999px;
    }
    .steering:before{width:12px;height:94px}
    .steering:after{width:94px;height:12px}
    .wheel-center{
      position:absolute;
      left:50%;
      top:50%;
      width:28px;
      height:28px;
      transform:translate(-50%,-50%);
      background:#c3cad2;
      border-radius:50%;
    }

    .drive-controls{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:center;
    }

    .drive-btn{
      width:120px;
      height:78px;
      border-radius:18px;
      font-size:28px;
      font-weight:800;
      box-shadow:0 12px 22px rgba(0,0,0,.18);
      background:linear-gradient(180deg,#f0f0f0,#d9e0e8);
      color:#1b2e4a;
    }

    .map-box{
      width:150px;
      height:112px;
      border-radius:24px;
      padding:10px;
      background:rgba(245,245,245,.92);
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }

    .mini-map{
      position:relative;
      width:100%;
      height:100%;
      border-radius:16px;
      overflow:hidden;
      background:linear-gradient(180deg,#cceea6,#9cd56a);
      border:3px solid rgba(0,0,0,.08);
    }
    .mini-route{
      position:absolute;
      left:16%;
      top:12%;
      width:68%;
      height:74%;
      border:6px solid #6b7280;
      border-radius:18px;
    }
    .mini-route:before,.mini-route:after{
      content:"";
      position:absolute;
      background:#6b7280;
      border-radius:999px;
    }
    .mini-route:before{
      width:50%;
      height:6px;
      left:-2px;
      top:28%;
    }
    .mini-route:after{
      width:6px;
      height:44%;
      right:16%;
      bottom:-2px;
    }
    .mini-dot{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      background:#ffd400;
      box-shadow:0 0 8px rgba(255,212,0,.7);
      transition:left .2s linear, top .2s linear;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(9,19,34,.34);
      padding:20px;
    }
    .modal{
      width:100%;
      max-width:560px;
      background:rgba(255,255,255,.97);
      border-radius:28px;
      box-shadow:0 24px 50px rgba(0,0,0,.26);
      padding:28px;
      text-align:center;
    }
    .modal h2{
      margin:0 0 10px;
      font-size:32px;
    }
    .modal-icon{
      font-size:62px;
      margin-bottom:8px;
    }
    .question-box{
      background:linear-gradient(180deg,#f8fcff,#edf6fb);
      border-radius:20px;
      padding:18px;
      font-size:30px;
      font-weight:900;
      margin:18px 0;
    }
    .answers.choice{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .answer-input-row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .answer-input-row input{
      flex:1;
      padding:14px 16px;
      font-size:18px;
      border-radius:16px;
      border:2px solid #cbd5e1;
      outline:none;
    }
    .feedback{
      margin-top:16px;
      border-radius:16px;
      padding:12px 14px;
      font-weight:800;
    }
    .feedback.success{
      background:#d1fae5;
      color:#065f46;
    }
    .feedback.warning{
      background:#fef3c7;
      color:#92400e;
    }
    .finish-box{
      margin:18px auto 0;
      max-width:340px;
      background:linear-gradient(180deg,#dff4ff,#b7e7ff);
      border-radius:20px;
      padding:18px;
      font-size:24px;
      font-weight:900;
    }
    .finish-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .tiny{
      font-size:14px;
      color:rgba(16,35,58,.72);
    }

    @media (max-width:1200px){
      .app{grid-template-columns:1fr}
      .game-wrap{min-height:760px}
    }

    @media (max-width:760px){
      .stats,.controls,.answers.choice{grid-template-columns:1fr}
      .answer-input-row{flex-direction:column}
      .drive-btn{width:92px;height:68px;font-size:24px}
      .wheel-box{width:120px;height:120px}
      .map-box{width:120px;height:96px}
      .player-car{width:190px;height:170px}
      .top-left-preview{width:100px;height:100px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="title-row">
        <h1 id="gameTitle">Гонка</h1>
        <div class="badge" id="levelBadge">Уровень 1</div>
      </div>

      <div class="stats">
        <div class="stat blue">
          <div class="stat-label">💎 Алмазы</div>
          <div class="stat-value" id="diamondsValue">0</div>
        </div>
        <div class="stat yellow">
          <div class="stat-label">⏱ Время</div>
          <div class="stat-value" id="timeValue">45</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span>Прогресс трассы</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="box">
        <h3>Управление</h3>
        <div class="controls">
          <button class="btn-secondary" id="btnUp">⬆ Вверх</button>
          <button class="btn-secondary" id="btnDown">⬇ Вниз</button>
        </div>
        <p class="note">Кнопки есть и здесь, и внизу под дорогой.</p>
      </div>

      <div class="box">
        <h3>Параметры прототипа</h3>

        <div class="setting-item">
          <label for="speedRange">Скорость: <span id="speedLabel">6</span></label>
          <input type="range" id="speedRange" min="4" max="12" step="1" value="6" />
        </div>

        <div class="setting-item">
          <label for="timeRange">Время: <span id="timeLabel">45</span> сек</label>
          <input type="range" id="timeRange" min="20" max="90" step="5" value="45" />
        </div>

        <div class="controls">
          <button class="btn-primary" id="btnStart">▶ Старт</button>
          <button class="btn-outline" id="btnReset">↻ Сброс</button>
        </div>
      </div>

      <div class="box">
        <p class="note">
          Здесь уже реализованы: хаотичные алмазы, хаотичные препятствия, потеря алмазов при столкновении, нижние кнопки управления и дорога в линию горизонта.
        </p>
      </div>
    </aside>

    <main class="game-wrap">
      <div class="sky"></div>

      <div class="cloud" style="width:132px;height:42px;left:160px;top:48px;"></div>
      <div class="cloud" style="width:160px;height:48px;right:120px;top:62px;"></div>

      <div class="horizon"></div>

      <div class="hill" style="left:-4%;width:46%;height:220px;"></div>
      <div class="hill" style="left:26%;width:30%;height:170px;"></div>
      <div class="hill" style="right:8%;width:36%;height:270px;"></div>

      <div class="ground"></div>

      <div class="tree" style="left:10%;"><div class="crown"></div><div class="trunk"></div></div>
      <div class="tree" style="left:18%;bottom:31%;"><div class="crown"></div><div class="trunk"></div></div>
      <div class="tree" style="right:12%;bottom:32%;"><div class="crown"></div><div class="trunk"></div></div>
      <div class="tree" style="right:4%;bottom:33%;"><div class="crown"></div><div class="trunk"></div></div>

      <div class="road-area">
        <div class="road-perspective"></div>
        <div class="center-line" id="centerLine"></div>
        <div class="guard left"></div>
        <div class="guard right"></div>

        <div class="glow-pad" style="left:30%;top:48%;width:82px;height:28px;"></div>
        <div class="glow-pad" style="left:26%;top:63%;width:82px;height:34px;"></div>
        <div class="glow-pad" style="left:23%;top:76%;width:98px;height:38px;"></div>

        <div class="glow-pad" style="right:30%;top:48%;width:82px;height:28px;"></div>
        <div class="glow-pad" style="right:26%;top:63%;width:82px;height:34px;"></div>
        <div class="glow-pad" style="right:23%;top:76%;width:98px;height:38px;"></div>
      </div>

      <div class="top-left-preview">
        <div class="preview-scene">
          <div class="preview-road"></div>
          <div class="preview-car"></div>
        </div>
      </div>

      <div class="level-pill" id="levelFlag">🏁 Уровень 1</div>

      <div class="object-layer" id="objectsLayer"></div>

      <div class="player-car" id="playerCar">
        <div class="car-body"></div>
        <div class="car-window"></div>
        <div class="car-tail"></div>
        <div class="neon-left"></div>
        <div class="neon-right"></div>
        <div class="thruster-left"></div>
        <div class="thruster-right"></div>
      </div>

      <div class="bottom-controls">
        <div class="wheel-box">
          <div class="steering" id="steeringWheel">
            <div class="wheel-center"></div>
          </div>
        </div>

        <div class="drive-controls">
          <button class="drive-btn" id="bottomUp">⬆</button>
          <button class="drive-btn" id="bottomDown">⬇</button>
        </div>

        <div class="map-box">
          <div class="mini-map">
            <div class="mini-route"></div>
            <div class="mini-dot" id="miniDot" style="left:18%;top:70%;"></div>
          </div>
        </div>
      </div>

      <div id="overlayLayer"></div>
    </main>
  </div>

  <script>
    const GAME_CONFIG = {
      meta: {
        title: "Гонка",
        finishMessage: "Поздравляем! Ты финишировал!",
        startButtonText: "Старт",
        restartButtonText: "Играть снова"
      },
      teacherSettings: {
        speed: 6,
        totalTimeSec: 45,
        attemptsPerQuestion: 1,
        loseDiamondsOnCrash: 1,
        gainDiamondsOnCorrect: 1,
        useKeyboard: true,
        objectCount: 16,
        diamondRatio: 0.55
      },
      levels: [
        {
          id: 1,
          name: "Уровень 1",
          distance: 100,
          laneCount: 3,
          questions: [
            { id: "l1q1", prompt: "3 + 2 = ?", answerType: "choice", correctAnswer: "5", options: ["4", "5", "6"] },
            { id: "l1q2", prompt: "8 - 3 = ?", answerType: "choice", correctAnswer: "5", options: ["5", "4", "6"] },
            { id: "l1q3", prompt: "6 + 1 = ?", answerType: "input", correctAnswer: "7" },
            { id: "l1q4", prompt: "4 + 4 = ?", answerType: "choice", correctAnswer: "8", options: ["7", "8", "9"] },
            { id: "l1q5", prompt: "10 - 6 = ?", answerType: "input", correctAnswer: "4" }
          ]
        },
        {
          id: 2,
          name: "Уровень 2",
          distance: 120,
          laneCount: 3,
          questions: [
            { id: "l2q1", prompt: "12 - 5 = ?", answerType: "choice", correctAnswer: "7", options: ["6", "7", "8"] },
            { id: "l2q2", prompt: "9 + 6 = ?", answerType: "input", correctAnswer: "15" },
            { id: "l2q3", prompt: "14 - 4 = ?", answerType: "choice", correctAnswer: "10", options: ["9", "10", "11"] },
            { id: "l2q4", prompt: "5 × 2 = ?", answerType: "choice", correctAnswer: "10", options: ["8", "10", "12"] },
            { id: "l2q5", prompt: "18 - 9 = ?", answerType: "input", correctAnswer: "9" }
          ]
        }
      ]
    };

    const GAME = {
      tickMs: 40,
      lanePositions: [0.405, 0.5, 0.595],
      startY: 19,
      endY: 73,
      dashOffset: 0
    };

    const state = {
      settings: JSON.parse(JSON.stringify(GAME_CONFIG.teacherSettings)),
      currentLevelIndex: 0,
      gameStatus: "ready",
      playerLane: 1,
      diamonds: 0,
      timeLeft: GAME_CONFIG.teacherSettings.totalTimeSec,
      distancePassed: 0,
      runtimeObjects: [],
      quizState: null,
      finishStats: null,
      nextQuestionIndex: 0,
      timerAcc: 0,
      gameLoop: null
    };

    const ui = {
      gameTitle: document.getElementById("gameTitle"),
      levelBadge: document.getElementById("levelBadge"),
      levelFlag: document.getElementById("levelFlag"),
      diamondsValue: document.getElementById("diamondsValue"),
      timeValue: document.getElementById("timeValue"),
      progressText: document.getElementById("progressText"),
      progressBar: document.getElementById("progressBar"),
      objectsLayer: document.getElementById("objectsLayer"),
      overlayLayer: document.getElementById("overlayLayer"),
      btnUp: document.getElementById("btnUp"),
      btnDown: document.getElementById("btnDown"),
      bottomUp: document.getElementById("bottomUp"),
      bottomDown: document.getElementById("bottomDown"),
      btnStart: document.getElementById("btnStart"),
      btnReset: document.getElementById("btnReset"),
      speedRange: document.getElementById("speedRange"),
      timeRange: document.getElementById("timeRange"),
      speedLabel: document.getElementById("speedLabel"),
      timeLabel: document.getElementById("timeLabel"),
      playerCar: document.getElementById("playerCar"),
      miniDot: document.getElementById("miniDot"),
      steeringWheel: document.getElementById("steeringWheel"),
      centerLine: document.getElementById("centerLine")
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function currentLevel() {
      return GAME_CONFIG.levels[state.currentLevelIndex];
    }

    function normalizeAnswer(value) {
      return String(value ?? "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function laneX(lane) {
      return GAME.lanePositions[lane] ?? GAME.lanePositions[1];
    }

    function progressToScreen(progress) {
      const y = GAME.startY + (GAME.endY - GAME.startY) * progress;
      const scale = 0.34 + progress * 1.28;
      return { y, scale };
    }

    function createRandomObject(i, level) {
      const isDiamond = Math.random() < state.settings.diamondRatio;
      const variants = ["rock", "cone", "car"];
      return {
        id: uid() + "_" + i,
        type: isDiamond ? "diamond" : "obstacle",
        variant: isDiamond ? null : variants[Math.floor(Math.random() * variants.length)],
        lane: Math.floor(Math.random() * level.laneCount),
        progress: -(i * 0.22 + Math.random() * 0.25 + 0.35),
        active: true
      };
    }

    function buildRandomRuntime(level) {
      const objects = [];
      for (let i = 0; i < state.settings.objectCount; i++) {
        objects.push(createRandomObject(i, level));
      }
      return objects;
    }

    function respawnObject(obj, level) {
      const isDiamond = Math.random() < state.settings.diamondRatio;
      const variants = ["rock", "cone", "car"];
      obj.type = isDiamond ? "diamond" : "obstacle";
      obj.variant = isDiamond ? null : variants[Math.floor(Math.random() * variants.length)];
      obj.lane = Math.floor(Math.random() * level.laneCount);
      obj.progress = -(0.5 + Math.random() * 1.5);
      obj.active = true;
    }

    function renderHUD() {
      const level = currentLevel();
      const progress = clamp((state.distancePassed / level.distance) * 100, 0, 100);

      ui.gameTitle.textContent = GAME_CONFIG.meta.title;
      ui.levelBadge.textContent = level.name;
      ui.levelFlag.textContent = "🏁 " + level.name;
      ui.diamondsValue.textContent = state.diamonds;
      ui.timeValue.textContent = state.timeLeft;
      ui.progressText.textContent = Math.round(progress) + "%";
      ui.progressBar.style.width = progress + "%";
      ui.speedLabel.textContent = state.settings.speed;
      ui.timeLabel.textContent = state.settings.totalTimeSec;

      const mapX = 18 + progress * 0.45;
      const mapY = 70 - progress * 0.55;
      ui.miniDot.style.left = mapX + "%";
      ui.miniDot.style.top = mapY + "%";
    }

    function updatePlayerVisual() {
      const xShift = [-120, 0, 120][state.playerLane] || 0;
      const tilt = [-10, 0, 10][state.playerLane] || 0;
      ui.playerCar.style.transform = "translateX(calc(-50% + " + xShift + "px))";
      ui.steeringWheel.style.transform = "rotate(" + (tilt * 3) + "deg)";
    }

    function createObjectElement(obj) {
      const pos = progressToScreen(obj.progress);
      if (pos.y < 10 || pos.y > 82) return null;

      const el = document.createElement("div");
      el.className = "game-object";
      el.style.left = (laneX(obj.lane) * 100) + "%";
      el.style.top = pos.y + "%";
      el.style.width = (50 * pos.scale) + "px";
      el.style.height = (50 * pos.scale) + "px";

      const inner = document.createElement("div");
      if (obj.type === "diamond") {
        inner.className = "diamond";
      } else if (obj.variant === "cone") {
        inner.className = "obstacle-cone";
      } else if (obj.variant === "car") {
        inner.className = "obstacle-car";
      } else {
        inner.className = "obstacle-rock";
      }

      el.appendChild(inner);
      return el;
    }

    function renderObjects() {
      ui.objectsLayer.innerHTML = "";
      for (const obj of state.runtimeObjects) {
        if (!obj.active) continue;
        const el = createObjectElement(obj);
        if (el) ui.objectsLayer.appendChild(el);
      }
    }

    function renderOverlay() {
      ui.overlayLayer.innerHTML = "";

      if (state.gameStatus === "ready") {
        ui.overlayLayer.innerHTML = `
          <div class="overlay">
            <div class="modal">
              <div class="modal-icon">🏁</div>
              <h2>Готов к старту?</h2>
              <p>Собирай алмазы, решай задания и избегай препятствий.</p>
              <button class="btn-primary" id="overlayStartBtn" style="width:100%;margin-top:12px;">
                ▶ ${GAME_CONFIG.meta.startButtonText}
              </button>
            </div>
          </div>
        `;
        document.getElementById("overlayStartBtn").addEventListener("click", startGame);
      }

      if (state.gameStatus === "pausedForQuiz" && state.quizState) {
        const q = state.quizState.question;
        let content = `
          <div class="overlay">
            <div class="modal">
              <h2>Задание за алмаз</h2>
              <div class="question-box">${q.prompt}</div>
        `;

        if (q.answerType === "choice") {
          content += `<div class="answers choice">`;
          q.options.forEach(option => {
            content += `<button class="btn-secondary quiz-choice" data-answer="${option}">${option}</button>`;
          });
          content += `</div>`;
        } else {
          content += `
            <div class="answer-input-row">
              <input id="quizInput" type="text" placeholder="Введи ответ" />
              <button class="btn-primary" id="quizSubmitBtn">Ответить</button>
            </div>
          `;
        }

        if (state.quizState.feedback) {
          content += `
            <div class="feedback ${state.quizState.feedback.type}">
              ${state.quizState.feedback.message}
            </div>
          `;
        }

        content += `
              <p class="tiny" style="margin-top:12px;">
                Попытка: ${state.quizState.attemptsUsed + 1}
                ${state.quizState.maxAttempts > 0 ? " / " + state.quizState.maxAttempts : ""}
              </p>
            </div>
          </div>
        `;

        ui.overlayLayer.innerHTML = content;

        if (q.answerType === "choice") {
          document.querySelectorAll(".quiz-choice").forEach(btn => {
            btn.addEventListener("click", () => submitAnswer(btn.dataset.answer));
          });
        } else {
          const input = document.getElementById("quizInput");
          const submitBtn = document.getElementById("quizSubmitBtn");
          input.focus();
          submitBtn.addEventListener("click", () => submitAnswer(input.value));
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submitAnswer(input.value);
          });
        }
      }

      if (state.gameStatus === "finished" && state.finishStats) {
        const stats = state.finishStats;
        ui.overlayLayer.innerHTML = `
          <div class="overlay">
            <div class="modal">
              <div class="modal-icon">🏎️</div>
              <h2>${stats.success ? GAME_CONFIG.meta.finishMessage : "Время вышло!"}</h2>
              <p>Уровень: ${stats.levelName}</p>
              <div class="finish-box">💎 Собрано алмазов: ${stats.diamonds}</div>
              <div class="finish-actions">
                <button class="btn-outline" id="restartBtn">${GAME_CONFIG.meta.restartButtonText}</button>
                ${stats.nextLevelAvailable ? `<button class="btn-primary" id="nextLevelBtn">Следующий уровень</button>` : ""}
              </div>
            </div>
          </div>
        `;

        document.getElementById("restartBtn").addEventListener("click", () => resetGame(state.currentLevelIndex));
        const nextLevelBtn = document.getElementById("nextLevelBtn");
        if (nextLevelBtn) {
          nextLevelBtn.addEventListener("click", () => resetGame(state.currentLevelIndex + 1));
        }
      }
    }

    function render() {
      renderHUD();
      renderObjects();
      renderOverlay();
      updatePlayerVisual();
    }

    function clearLoop() {
      if (state.gameLoop) {
        clearInterval(state.gameLoop);
        state.gameLoop = null;
      }
    }

    function setupLevel(index) {
      state.currentLevelIndex = index;
      state.playerLane = 1;
      state.runtimeObjects = buildRandomRuntime(currentLevel());
    }

    function resetGame(index = state.currentLevelIndex) {
      clearLoop();
      setupLevel(index);
      state.gameStatus = "ready";
      state.diamonds = 0;
      state.timeLeft = state.settings.totalTimeSec;
      state.distancePassed = 0;
      state.quizState = null;
      state.finishStats = null;
      state.nextQuestionIndex = 0;
      state.timerAcc = 0;
      GAME.dashOffset = 0;
      render();
    }

    function startGame() {
      clearLoop();
      setupLevel(state.currentLevelIndex);
      state.gameStatus = "running";
      state.diamonds = 0;
      state.timeLeft = state.settings.totalTimeSec;
      state.distancePassed = 0;
      state.quizState = null;
      state.finishStats = null;
      state.nextQuestionIndex = 0;
      state.timerAcc = 0;
      GAME.dashOffset = 0;
      render();
      state.gameLoop = setInterval(gameTick, GAME.tickMs);
    }

    function gameTick() {
      if (state.gameStatus !== "running") return;

      const level = currentLevel();

      state.distancePassed += state.settings.speed * 0.18;
      if (state.distancePassed > level.distance) state.distancePassed = level.distance;

      state.timerAcc += GAME.tickMs;
      if (state.timerAcc >= 1000) {
        state.timerAcc = 0;
        state.timeLeft = Math.max(0, state.timeLeft - 1);
      }

      GAME.dashOffset += state.settings.speed * 5;
      const offset = GAME.dashOffset % 98;
      ui.centerLine.style.background = `
        repeating-linear-gradient(
          180deg,
          rgba(255,232,166,.95) ${offset}px,
          rgba(255,232,166,.95) ${offset + 44}px,
          rgba(255,232,166,0) ${offset + 44}px,
          rgba(255,232,166,0) ${offset + 98}px
        )
      `;

      for (const obj of state.runtimeObjects) {
        if (!obj.active) continue;
        obj.progress += 0.008 + state.settings.speed * 0.0019;
        if (obj.progress > 1.15) {
          respawnObject(obj, level);
        }
      }

      checkCollisions();
      checkFinish();
      render();
    }

    function moveUp() {
      state.playerLane = clamp(state.playerLane - 1, 0, currentLevel().laneCount - 1);
      updatePlayerVisual();
    }

    function moveDown() {
      state.playerLane = clamp(state.playerLane + 1, 0, currentLevel().laneCount - 1);
      updatePlayerVisual();
    }

    function checkCollisions() {
      if (state.gameStatus !== "running") return;

      const collided = state.runtimeObjects.find(obj =>
        obj.active &&
        obj.lane === state.playerLane &&
        obj.progress > 0.88 &&
        obj.progress < 1.02
      );

      if (!collided) return;

      collided.active = false;

      if (collided.type === "obstacle") {
        state.diamonds = Math.max(0, state.diamonds - state.settings.loseDiamondsOnCrash);
        setTimeout(() => {
          respawnObject(collided, currentLevel());
        }, 300);
        return;
      }

      const level = currentLevel();
      const question = level.questions[state.nextQuestionIndex % level.questions.length];
      state.nextQuestionIndex += 1;
      state.gameStatus = "pausedForQuiz";
      state.quizState = {
        question,
        attemptsUsed: 0,
        maxAttempts: state.settings.attemptsPerQuestion,
        feedback: null
      };
    }

    function continueAfterQuiz(feedback) {
      state.quizState.feedback = feedback;
      renderOverlay();

      setTimeout(() => {
        state.quizState = null;
        state.gameStatus = "running";
        render();
      }, 800);
    }

    function submitAnswer(value) {
      if (!state.quizState || !state.quizState.question) return;

      const isCorrect = normalizeAnswer(value) === normalizeAnswer(state.quizState.question.correctAnswer);

      if (isCorrect) {
        state.diamonds += state.settings.gainDiamondsOnCorrect;
        continueAfterQuiz({ type: "success", message: "+1 алмаз! Верно." });
        return;
      }

      const nextAttempts = state.quizState.attemptsUsed + 1;
      const maxAttempts = state.quizState.maxAttempts;
      const canRetry = maxAttempts === 0 || nextAttempts < maxAttempts;

      if (canRetry) {
        state.quizState.attemptsUsed = nextAttempts;
        state.quizState.feedback = {
          type: "warning",
          message: "Пока неверно. Попробуй ещё раз."
        };
        renderOverlay();
        return;
      }

      continueAfterQuiz({ type: "warning", message: "Неверно. Едем дальше." });
    }

    function checkFinish() {
      if (state.gameStatus !== "running") return;

      const level = currentLevel();
      const noTime = state.timeLeft <= 0;
      const finishedDistance = state.distancePassed >= level.distance;

      if (!noTime && !finishedDistance) return;

      clearLoop();

      const isLastLevel = state.currentLevelIndex >= GAME_CONFIG.levels.length - 1;
      state.gameStatus = "finished";
      state.finishStats = {
        diamonds: state.diamonds,
        levelName: level.name,
        success: finishedDistance,
        nextLevelAvailable: finishedDistance && !isLastLevel
      };
      render();
    }

    ui.btnUp.addEventListener("click", moveUp);
    ui.btnDown.addEventListener("click", moveDown);
    ui.bottomUp.addEventListener("click", moveUp);
    ui.bottomDown.addEventListener("click", moveDown);
    ui.btnStart.addEventListener("click", startGame);
    ui.btnReset.addEventListener("click", () => resetGame(state.currentLevelIndex));

    ui.speedRange.addEventListener("input", (e) => {
      state.settings.speed = Number(e.target.value);
      ui.speedLabel.textContent = state.settings.speed;
    });

    ui.timeRange.addEventListener("input", (e) => {
      state.settings.totalTimeSec = Number(e.target.value);
      ui.timeLabel.textContent = state.settings.totalTimeSec;
      if (state.gameStatus === "ready") state.timeLeft = state.settings.totalTimeSec;
      renderHUD();
    });

    document.addEventListener("keydown", (e) => {
      if (!state.settings.useKeyboard) return;
      if (["ArrowUp", "w", "W", "ц", "Ц"].includes(e.key)) moveUp();
      if (["ArrowDown", "s", "S", "ы", "Ы"].includes(e.key)) moveDown();
    });

    function init() {
      setupLevel(0);
      resetGame(0);
      updatePlayerVisual();
    }

    init();
  </script>
</body>
</html>
