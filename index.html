<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гонка — образовательная игра</title>
  <style>
    :root {
      --sky-top: #65dbff;
      --sky-bottom: #dff8ff;
      --road-main: #f7bf56;
      --road-shadow: #dfa13a;
      --road-line: #ffe5a3;
      --hud-bg: rgba(255,255,255,0.92);
      --text: #10233a;
      --accent: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --shadow: 0 16px 36px rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #7ce4ff 0%, #dff8ff 100%);
      min-height: 100vh;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--hud-bg);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(4px);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .title-row h1 { margin: 0; font-size: 30px; }

    .badge {
      padding: 8px 14px;
      border-radius: 999px;
      background: #e6f2ff;
      font-weight: bold;
      font-size: 14px;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      border-radius: 18px;
      padding: 14px;
    }

    .stat-card.blue { background: linear-gradient(180deg, #dff4ff, #bfe8ff); }
    .stat-card.gold { background: linear-gradient(180deg, #fff2c8, #ffd979); }

    .stat-label {
      font-size: 13px;
      color: rgba(16,35,58,0.7);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 900;
    }

    .progress-wrap { margin-bottom: 16px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
      color: rgba(16,35,58,0.75);
    }

    .progress {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      overflow: hidden;
      background: #d7e5ef;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #00c3ff, #2055ff);
      transition: width 0.15s linear;
    }

    .box {
      background: linear-gradient(180deg, #f9fcff, #edf6fb);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .box h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .controls,
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-row { margin-top: 12px; }

    .setting-item { margin-bottom: 14px; }

    .setting-item label {
      display: block;
      font-size: 14px;
      margin-bottom: 7px;
      color: rgba(16,35,58,0.75);
    }

    input[type="range"] { width: 100%; }

    button {
      border: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      transition: transform 0.08s ease, opacity 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    button:hover { opacity: 0.96; }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(180deg, #33c8ff, #2563eb);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(180deg, #ffffff, #ddeaf5);
      color: var(--text);
    }

    .btn-outline {
      background: white;
      color: var(--text);
      border: 2px solid rgba(16,35,58,0.12);
    }

    .note {
      font-size: 14px;
      color: rgba(16,35,58,0.72);
      line-height: 1.45;
      margin: 0;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      min-height: 680px;
      overflow: hidden;
      border-radius: 34px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.24);
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%, #9ee7ff 100%);
      border: 2px solid rgba(255,255,255,0.65);
    }

    .world {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        url("assets/bg-sky.png") center top / cover no-repeat,
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%, #9ee7ff 100%);
    }

    .hill {
      position: absolute;
      bottom: 325px;
      background: linear-gradient(180deg, #79d635, #51b326);
      border-radius: 50% 50% 0 0;
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.05);
      z-index: 1;
    }

    .decor-bg {
      position: absolute;
      inset: 0;
      background: url("assets/bg-hills.png") center bottom / cover no-repeat;
      pointer-events: none;
      z-index: 2;
      opacity: 1;
    }

    .road-area {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .road-perspective {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 68%;
      height: 88%;
      transform: translateX(-50%);
      clip-path: polygon(49% 0%, 51% 0%, 100% 100%, 0% 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(0,0,0,0.12)),
        linear-gradient(180deg, var(--road-main), var(--road-shadow));
    }

    .road-center-line {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8%;
      height: 88%;
      transform: translateX(-50%);
      clip-path: polygon(49% 0%, 51% 0%, 100% 100%, 0% 100%);
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 236, 169, 0.95) 0px,
          rgba(255, 236, 169, 0.95) 34px,
          rgba(255, 236, 169, 0) 34px,
          rgba(255, 236, 169, 0) 76px
        );
      opacity: 0.9;
    }

    .guard {
      position: absolute;
      bottom: 0;
      height: 76%;
      width: 14%;
      z-index: 4;
    }

    .guard.left {
      left: 10.7%;
      clip-path: polygon(40% 0, 62% 0, 100% 100%, 0 100%);
      background:
        repeating-linear-gradient(
          90deg,
          #ffffff 0px, #ffffff 24px,
          #d62828 24px, #d62828 48px
        );
    }

    .guard.right {
      right: 10.7%;
      clip-path: polygon(38% 0, 60% 0, 100% 100%, 0 100%);
      background:
        repeating-linear-gradient(
          90deg,
          #ffffff 0px, #ffffff 24px,
          #d62828 24px, #d62828 48px
        );
    }

    .lane-strip {
      position: absolute;
      background: rgba(81, 167, 255, 0.28);
      border: 3px solid rgba(86, 201, 255, 0.8);
      border-radius: 6px;
      box-shadow:
        0 0 10px rgba(86, 201, 255, 0.45),
        inset 0 0 8px rgba(255,255,255,0.3);
      z-index: 5;
    }

    .hud-corner {
      position: absolute;
      z-index: 18;
      background: rgba(255,255,255,0.88);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .mini-preview {
      left: 18px;
      top: 18px;
      width: 120px;
      height: 120px;
      overflow: hidden;
      padding: 8px;
    }

    .mini-preview-scene {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, #7ce4ff 0%, #dff8ff 40%, #8ddf58 100%);
    }

    .mini-road {
      position: absolute;
      left: 50%;
      bottom: -2px;
      width: 75%;
      height: 90%;
      transform: translateX(-50%);
      clip-path: polygon(38% 0, 62% 0, 100% 100%, 0 100%);
      background: linear-gradient(180deg, #f7bf56, #dfa13a);
    }

    .mini-car {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 34px;
      height: 46px;
      background: url("assets/car.png") center / contain no-repeat;
    }

    .level-pill {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 18;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
      font-size: 14px;
      font-weight: 900;
      color: #173455;
    }

    .steering {
      left: 22px;
      bottom: 18px;
      width: 122px;
      height: 122px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .steering-wheel {
      position: relative;
      width: 88px;
      height: 88px;
      border: 8px solid #8f6e46;
      border-radius: 50%;
      background: radial-gradient(circle, #c8cdd3 0%, #aab4bf 40%, transparent 42%);
      transition: transform 0.12s ease;
    }

    .steering-wheel::before,
    .steering-wheel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: #8f6e46;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .steering-wheel::before { width: 10px; height: 82px; }
    .steering-wheel::after { width: 82px; height: 10px; }

    .wheel-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      background: #b0b8c3;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .pedals {
      right: 162px;
      bottom: 28px;
      width: 88px;
      height: 92px;
      background: transparent;
      box-shadow: none;
      border: none;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .pedal {
      width: 28px;
      border-radius: 8px;
      background: linear-gradient(180deg, #f3f4f6, #9ca3af);
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 8px 14px rgba(0,0,0,0.18);
    }

    .pedal.small { height: 46px; }
    .pedal.big { height: 62px; }

    .mini-map {
      right: 18px;
      bottom: 22px;
      width: 126px;
      height: 106px;
      padding: 8px;
      overflow: hidden;
      background:
        rgba(255,255,255,0.88)
        url("assets/mini-map.png") center / cover no-repeat;
    }

    .mini-map-screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 14px;
      background: linear-gradient(180deg, #cceea6, #9cd56a);
      overflow: hidden;
      border: 3px solid rgba(0,0,0,0.08);
    }

    .mini-route {
      position: absolute;
      left: 16%;
      top: 12%;
      width: 68%;
      height: 74%;
      border: 6px solid #6b7280;
      border-radius: 18px;
    }

    .mini-route::before,
    .mini-route::after {
      content: "";
      position: absolute;
      background: #6b7280;
      border-radius: 999px;
    }

    .mini-route::before {
      width: 50%;
      height: 6px;
      left: -2px;
      top: 28%;
    }

    .mini-route::after {
      width: 6px;
      height: 44%;
      right: 16%;
      bottom: -2px;
    }

    .mini-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffd400;
      box-shadow: 0 0 8px rgba(255,212,0,0.7);
      transition: left 0.2s linear, top 0.2s linear;
    }

    .object-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .game-object {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transform-origin: center center;
      filter: drop-shadow(0 12px 12px rgba(0,0,0,0.22));
      pointer-events: none;
    }

    .sprite {
      width: 100%;
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .diamond-fallback,
    .rock-fallback,
    .cone-fallback,
    .enemy-fallback {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .diamond-fallback {
      clip-path: polygon(50% 0%, 88% 26%, 72% 100%, 28% 100%, 12% 26%);
      background: linear-gradient(180deg, #d8ffff, #56d8ff 50%, #0ea5e9 100%);
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 16px rgba(65,216,255,0.8);
      animation: diamondPulse 0.8s infinite ease-in-out;
    }

    .diamond-fallback::before {
      content: "";
      position: absolute;
      inset: 12% 20% 40% 20%;
      background: rgba(255,255,255,0.35);
      clip-path: polygon(50% 0%, 100% 40%, 50% 100%, 0% 40%);
    }

    @keyframes diamondPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .rock-fallback::before {
      content: "";
      position: absolute;
      inset: 12%;
      background: linear-gradient(180deg, #9ca3af, #4b5563);
      clip-path: polygon(24% 20%, 55% 6%, 84% 20%, 94% 54%, 74% 90%, 31% 95%, 10% 62%);
      border-radius: 14px;
    }

    .cone-fallback::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%);
      width: 56%;
      height: 70%;
      background: linear-gradient(180deg, #ffb54a, #ff6a00);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      border-radius: 10px;
    }

    .cone-fallback::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      width: 84%;
      height: 16%;
      background: linear-gradient(180deg, #fff, #e5e7eb);
      border-radius: 999px;
    }

    .enemy-fallback::before {
      content: "";
      position: absolute;
      inset: 10%;
      background: linear-gradient(180deg, #ff5252, #991b1b);
      border-radius: 12px;
      clip-path: polygon(50% 0%, 84% 18%, 94% 48%, 86% 84%, 50% 100%, 14% 84%, 6% 48%, 16% 18%);
    }

    .player-car {
      position: absolute;
      left: 50%;
      bottom: 84px;
      width: 260px;
      height: 220px;
      transform: translateX(-50%);
      z-index: 12;
      transition: transform 0.18s ease;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,0.28));
      pointer-events: none;
      background: center / contain no-repeat;
    }

    .player-car.fallback::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 4%, 74% 18%, 84% 39%, 88% 66%, 77% 86%, 50% 98%, 23% 86%, 12% 66%, 16% 39%, 26% 18%);
      background:
        linear-gradient(180deg, #38d9ff 0%, #1f7eff 42%, #4b00b6 100%);
      border: 4px solid rgba(255,255,255,0.3);
      box-shadow:
        inset 0 8px 14px rgba(255,255,255,0.2),
        inset 0 -12px 20px rgba(0,0,0,0.25);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9,19,34,0.38);
      padding: 20px;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.26);
      padding: 28px;
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .modal-icon {
      font-size: 62px;
      margin-bottom: 8px;
    }

    .question-box {
      background: linear-gradient(180deg, #f8fcff, #edf6fb);
      border-radius: 20px;
      padding: 18px;
      font-size: 30px;
      font-weight: 900;
      margin: 18px 0;
    }

    .answers.choice {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .answer-input-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .answer-input-row input {
      flex: 1;
      padding: 14px 16px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid #cbd5e1;
      outline: none;
    }

    .feedback {
      margin-top: 16px;
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 800;
    }

    .feedback.success {
      background: #d1fae5;
      color: #065f46;
    }

    .feedback.warning {
      background: #fef3c7;
      color: #92400e;
    }

    .finish-box {
      margin: 18px auto 0;
      max-width: 340px;
      background: linear-gradient(180deg, #dff4ff, #b7e7ff);
      border-radius: 20px;
      padding: 18px;
      font-size: 24px;
      font-weight: 900;
    }

    .finish-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .tiny {
      font-size: 14px;
      color: rgba(16,35,58,0.72);
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
      .game-wrap { min-height: 620px; }
    }

    @media (max-width: 860px) {
      .game-wrap { min-height: 560px; }
      .player-car { width: 210px; height: 180px; }
    }

    @media (max-width: 640px) {
      .stats-grid,
      .controls,
      .action-row,
      .answers.choice {
        grid-template-columns: 1fr;
      }

      .answer-input-row { flex-direction: column; }
      .mini-preview,
      .mini-map,
      .pedals { display: none; }
      .player-car { width: 180px; height: 150px; }
      .steering { width: 96px; height: 96px; }
      .steering-wheel { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="title-row">
        <h1 id="gameTitle">Гонка</h1>
        <div class="badge" id="levelBadge">Уровень 1</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-label">💎 Алмазы</div>
          <div class="stat-value" id="diamondsValue">0</div>
        </div>
        <div class="stat-card gold">
          <div class="stat-label">⏱ Время</div>
          <div class="stat-value" id="timeValue">45</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Прогресс трассы</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="box">
        <h3>Управление</h3>
        <div class="controls">
          <button class="btn-secondary" id="btnUp">⬆ Вверх</button>
          <button class="btn-secondary" id="btnDown">⬇ Вниз</button>
        </div>
        <p class="tiny" style="margin-top:12px;">Также работают клавиши ↑ / ↓</p>
      </div>

      <div class="box">
        <h3>Параметры прототипа</h3>

        <div class="setting-item">
          <label for="speedRange">Скорость: <span id="speedLabel">7</span></label>
          <input type="range" id="speedRange" min="4" max="12" step="1" value="7" />
        </div>

        <div class="setting-item">
          <label for="timeRange">Время: <span id="timeLabel">45</span> сек</label>
          <input type="range" id="timeRange" min="20" max="90" step="5" value="45" />
        </div>

        <div class="action-row">
          <button class="btn-primary" id="btnStart">▶ Старт</button>
          <button class="btn-outline" id="btnReset">↻ Сброс</button>
        </div>
      </div>

      <div class="box">
        <p class="note">
          Эта версия использует PNG-спрайты из папки <b>assets</b>.  
          Можно легко заменить машину, алмаз, конусы, камни и вражеские машины без изменения логики.
        </p>
      </div>
    </aside>

    <main class="game-wrap">
      <div class="world" id="world">
        <div class="hill" style="left:-2%; width:40%; height:180px;"></div>
        <div class="hill" style="left:24%; width:28%; height:140px;"></div>
        <div class="hill" style="right:10%; width:36%; height:220px;"></div>
        <div class="decor-bg"></div>

        <div class="road-area">
          <div class="road-perspective"></div>
          <div class="road-center-line" id="roadCenterLine"></div>
          <div class="guard left"></div>
          <div class="guard right"></div>

          <div class="lane-strip" style="left:21%; bottom:21%; width:8%; height:4.5%;"></div>
          <div class="lane-strip" style="left:27%; bottom:33%; width:6.5%; height:4%;"></div>
          <div class="lane-strip" style="left:31%; bottom:49%; width:5%; height:3%;"></div>

          <div class="lane-strip" style="right:21%; bottom:21%; width:8%; height:4.5%;"></div>
          <div class="lane-strip" style="right:27%; bottom:33%; width:6.5%; height:4%;"></div>
          <div class="lane-strip" style="right:31%; bottom:49%; width:5%; height:3%;"></div>
        </div>

        <div class="level-pill" id="levelFlag">🏁 Уровень 1</div>

        <div class="hud-corner mini-preview">
          <div class="mini-preview-scene">
            <div class="mini-road"></div>
            <div class="mini-car"></div>
